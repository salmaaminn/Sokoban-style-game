# Treasure Runner Generator Config

# Seed for deterministic generation
# Use a positive integer for reproducible worlds.  The same seed always produces the same world.
# Use "random" for non-deterministic generation
# seed=random
seed=15

[world]
# Total number of rooms to generate
num_rooms=3

[room]
# Base dimensions for each room (before variance)
width=20
height=15

# Max variance (+/-) applied to each room's width/height
# Set to 0 for no variance (deterministic room sizes)
width_variance=2
height_variance=2

[portals]
# Base number of portals per room
# All portals will connect to a valid room
# Actual number per room varies: base +/- variance
portals_per_room=3
portals_variance=1

# Portal placement mode: "walls" (default) or "interior"
# - walls: portals appear on room boundaries (look like doors)
# - interior: portals can appear anywhere in the room
portal_placement=walls

# Connectivity probability for extra edges (0-100)
# After building the spanning tree, add extra edges with this probability
# Higher = more interconnected world (more optional paths)
connectivity_chance=30

[treasures]
# Base number of treasures per room (modified by difficulty)
# Actual number per room varies: base +/- variance
treasures_per_room=3
treasures_variance=0



[charset]
# Rendering characters 
# Use escape sequences: \s for space, \t for tab, \n for newline, \\ for backslash
wall=#
floor=.
player=@
treasure=$
portal=X
